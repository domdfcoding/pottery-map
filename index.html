<!DOCTYPE html>
<html>
<head>

    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>

            <meta name="viewport" content="width=device-width,
                initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
            <style>
                #map_pottery {
                    position: relative;
                    width: 100.0%;
                    height: 100.0%;
                    left: 0.0%;
                    top: 0.0%;
                }
                .leaflet-container { font-size: 16px; }
            </style>

            <style>html, body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }
            </style>

            <style>#map {
                position:absolute;
                top:0;
                bottom:0;
                right:0;
                left:0;
                }
            </style>

            <script>
                L_NO_TOUCH = false;
                L_DISABLE_3D = false;
            </script>


    <script src="https://cdn.jsdelivr.net/gh/domdfcoding/folium-zoom-state@v0.1.0b3/folium_zoom_state/zoom_state.min.js"></script>

				<style>
					img.pottery-image {
	max-width: 240px;
	height: auto;
}

.item-details {
	max-height: 50vh;
	overflow-y: scroll;
}

.item-details ul {
	list-style-type: none;
}

				</style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.1.0/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.1.0/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.1.0/MarkerCluster.Default.css"/>
    <script src="https://unpkg.com/leaflet-geosearch@4.4.0/dist/bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/domdfcoding/folium-map-search@v0.1.0b4/folium_map_search/folium-map-search.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@4.4.0/dist/geosearch.css"/>
</head>
<body>


            <div class="folium-map" id="map_pottery" ></div>

</body>
<script>


            var mapOptions = {
  "zoom": 10,
  "zoomControl": true,
  "preferCanvas": false,
  "maxZoom": 20,
  "wheelPxPerZoomLevel": 80,
};
            var defaultZoom = mapOptions["zoom"] ?? 0;
            var urlZoomState = zoomStateFromURL(defaultZoom, L.latLng([53.02445128825057, -2.1834733161173445]));
            mapOptions["zoom"] = urlZoomState["zoomLvl"]

            var map_pottery = L.map(
                "map_pottery",
                {
                    center: urlZoomState["centre"],
                    crs: L.CRS.EPSG3857,
                    ...mapOptions

                }
            );





            var tile_layer_osm_carto = L.tileLayer(
                "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
                {
  "minZoom": 0,
  "maxZoom": 20,
  "maxNativeZoom": 19,
  "noWrap": false,
  "attribution": "\u0026copy; \u003ca href=\"https://www.openstreetmap.org/copyright\"\u003eOpenStreetMap\u003c/a\u003e contributors",
  "subdomains": "abc",
  "detectRetina": false,
  "tms": false,
  "opacity": 1,
  "referrerPolicy": "strict-origin-when-cross-origin",
}

            );


            var tile_layer_os10k = L.tileLayer(
                "https://geo.nls.uk/mapdata3/os/britain10knationalgridnew/{z}/{x}/{y}.png",
                {
  "minZoom": 1,
  "maxZoom": 20,
  "maxNativeZoom": 16,
  "noWrap": false,
  "attribution": "OS 1:10,000 1949-1972 | \u003ca href=\u0027https://maps.nls.uk\u0027\u003emaps.nls.uk\u003c/a\u003e | CC-BY",
  "subdomains": "abc",
  "detectRetina": false,
  "tms": false,
  "opacity": 1,
}

            );


            var tile_layer_os1250 = L.tileLayer(
                "https://geo.nls.uk/maps/os/1250_B_2eng/{z}/{x}/{y}.png",
                {
  "minZoom": 1,
  "maxZoom": 20,
  "maxNativeZoom": 20,
  "noWrap": false,
  "attribution": "OS 1:1,250 1949-1975 | \u003ca href=\u0027https://maps.nls.uk\u0027\u003emaps.nls.uk\u003c/a\u003e | CC-BY",
  "subdomains": "abc",
  "detectRetina": false,
  "tms": false,
  "opacity": 1,
}

            );


            var tile_layer_os2500 = L.tileLayer(
                "https://geo.nls.uk/maps/os/2500_A_1S/{z}/{x}/{y}.png",
                {
  "minZoom": 1,
  "maxZoom": 20,
  "maxNativeZoom": 18,
  "noWrap": false,
  "attribution": "OS 1:2,500 1948-1975 | \u003ca href=\u0027https://maps.nls.uk\u0027\u003emaps.nls.uk\u003c/a\u003e | CC-BY",
  "subdomains": "abc",
  "detectRetina": false,
  "tms": false,
  "opacity": 1,
}

            );


            var tile_layer_os25inch = L.tileLayer(
                "https://mapseries-tilesets.s3.amazonaws.com/25_inch/stafford/{z}/{x}/{y}.png",
                {
  "minZoom": 1,
  "maxZoom": 20,
  "maxNativeZoom": 18,
  "noWrap": false,
  "attribution": "OS 25 Inch, 1892-1914 | \u003ca href=\u0027https://maps.nls.uk\u0027\u003emaps.nls.uk\u003c/a\u003e | CC-BY",
  "subdomains": "abc",
  "detectRetina": false,
  "tms": false,
  "opacity": 1,
}

            );



			setupZoomState(map_pottery);

			setupBasemapState(map_pottery);



            var marker_cluster_collection = L.markerClusterGroup(
                {
  "maxClusterRadius": 50,
}
            );


            var marker_j_g_meakin = L.marker(
                [53.02308684898784, -2.1629028183132877],
                {
  "searchName": "J \u0026 G Meakin",
}
            ).addTo(marker_cluster_collection);


        var popup_j_g_meakin = L.popup({
  "maxWidth": 400,
  "minWidth": 245,
});


                popup_j_g_meakin.setContent(`
<div id="html_j_g_meakin" style="width: 100.0%; height: 100.0%;"><div class="item-details">
    <h2>J & G Meakin</h2>
    <h3>
        <strong>Eagle Pottery</strong>
    </h3>

        <ul>
            <li>Strawberry Border</li>
            <li>Earthenware Plate</li>


                <li>
                    <i class="fa-solid fa-calendar-days"></i> c1970-c2000
                </li>

        </ul>
        <img class="pottery-image" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Meakin_%27Impact%27_tableware_-_2025-04-22_-_Andy_Mabbett_-_01.jpg/330px-Meakin_%27Impact%27_tableware_-_2025-04-22_-_Andy_Mabbett_-_01.jpg" />

</div></div>
`);


        marker_j_g_meakin.bindPopup(popup_j_g_meakin)
        ;




            marker_j_g_meakin.bindTooltip(
                `<div>
                     J & G Meakin
                 </div>`,
                {
  "sticky": true,
}
            );


            var marker_wedgwood = L.marker(
                [52.95429347186072, -2.1703569422826328],
                {
  "searchName": "Wedgwood",
}
            ).addTo(marker_cluster_collection);


        var popup_wedgwood = L.popup({
  "maxWidth": 400,
  "minWidth": 245,
});


                popup_wedgwood.setContent(`
<div id="html_wedgwood" style="width: 100.0%; height: 100.0%;"><div class="item-details">
    <h2>Wedgwood</h2>
    <h3>
        <strong>Wedgwood Barlaston</strong>
    </h3>

</div></div>
`);


        marker_wedgwood.bindPopup(popup_wedgwood)
        ;




            marker_wedgwood.bindTooltip(
                `<div>
                     Wedgwood
                 </div>`,
                {
  "sticky": true,
}
            );


            marker_cluster_collection.addTo(map_pottery);


            var layer_control_basemap_layers = {
                base_layers : {
                    "OpenStreetMap" : tile_layer_osm_carto,
                    "OS 1:10,000 1949-1972" : tile_layer_os10k,
                    "OS 1:1,250 1949-1975" : tile_layer_os1250,
                    "OS 1:2,500 1948-1975" : tile_layer_os2500,
                    "OS 25 Inch, 1892-1914" : tile_layer_os25inch,
                },
                overlays :  {
                },
            };
            let layer_control_basemap = L.control.layers(
                layer_control_basemap_layers.base_layers,
                layer_control_basemap_layers.overlays,
                {
  "position": "topright",
  "collapsed": true,
  "autoZIndex": true,
}
            ).addTo(map_pottery);



			basemapFromURL("OpenStreetMap", layer_control_basemap).addTo(map_pottery);


				var map_search_control_5a445d4920eb4d85bb24b9224192cafd = L.MapSearchControl({
					provider: new L.MapSearchProvider({
				map: map_pottery,
				layer: marker_cluster_collection,
				...{"featureType": "settlement"},
				}),
					...{"autoCompleteDelay": 1000, "closeOnSubmit": true, "disableEnterSearch": true, "maxSuggestions": 15, "searchLabel": "Enter town or manufacturer name", "showMarker": false},
					}
				)

				// Close search box when map clicked.
				map_pottery.on('click', map_search_control_5a445d4920eb4d85bb24b9224192cafd.close, map_search_control_5a445d4920eb4d85bb24b9224192cafd);

				map_search_control_5a445d4920eb4d85bb24b9224192cafd.addTo(map_pottery);

</script>
</html>
